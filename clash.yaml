# ==================== 基础配置 ====================
mode: rule
mixed-port: 7890
ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: true
global-ua: clash.meta
find-process-mode: strict
log-level: warning
keep-alive-idle: 600
keep-alive-interval: 30
geodata-mode: true
geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 168
external-controller: 127.0.0.1:9090

geox-url:
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.metadb
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

profile:
  store-selected: true
  store-fake-ip: true

# ==================== Sniffer ====================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - +.push.apple.com
    - +.apple.com
    - +.wechat.com
    - +.qq.com
    - +.tencent.com
    - +.vivox.com

# ==================== TUN ====================
tun:
  enable: true
  stack: mixed
  mtu: 1500
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true
  endpoint-independent-nat: true

# ==================== DNS ====================
dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  prefer-h3: true
  use-hosts: true
  use-system-hosts: false
  # DNS 查询不走路由规则，防止 8.8.8.8 被 google_ip 捕获后走代理策略组
  respect-rules: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "time.*.com"
    - "ntp.*.com"
    - +.pool.ntp.org
    - +.msftconnecttest.com
    - +.msftncsi.com
    - "geosite:cn"
    - "geosite:private"
    - +.stun.*.*
    - +.stun.*
    - +.wechat.com
    - +.kg.qq.com
    - +.wanggou.com
    - +.jd.com
    - +.mi.com
    - mesh.ts.net
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  proxy-server-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  direct-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  direct-nameserver-follow-policy: false
  nameserver:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  cache-algorithm: arc
  nameserver-policy:
    "rule-set:cn_domain":        [119.29.29.29, 223.5.5.5]
    "rule-set:private_domain":   [119.29.29.29, 223.5.5.5]
    "geosite:cn":                [119.29.29.29, 223.5.5.5]
    "geosite:private":           [119.29.29.29, 223.5.5.5]
    "rule-set:microsoft_domain": [119.29.29.29, 223.5.5.5]
    "rule-set:apple_domain":     [119.29.29.29, 223.5.5.5]
    "rule-set:apple_cn_domain":  [119.29.29.29, 223.5.5.5]
    "rule-set:gfw_domain":       [https://8.8.8.8/dns-query, https://1.1.1.1/dns-query]
    "rule-set:geolocation-!cn":  [https://8.8.8.8/dns-query, https://1.1.1.1/dns-query]
    "rule-set:google_domain":    [https://8.8.8.8/dns-query, https://1.1.1.1/dns-query]
    "rule-set:youtube_domain":   [https://8.8.8.8/dns-query, https://1.1.1.1/dns-query]
    "rule-set:telegram_domain":  [https://8.8.8.8/dns-query, https://1.1.1.1/dns-query]
    "rule-set:twitter_domain":   [https://8.8.8.8/dns-query, https://1.1.1.1/dns-query]
    "rule-set:netflix_domain":   [https://8.8.8.8/dns-query, https://1.1.1.1/dns-query]
    "rule-set:github_domain":    [https://8.8.8.8/dns-query, https://1.1.1.1/dns-query]
    "rule-set:openai_domain":    [https://8.8.8.8/dns-query, https://1.1.1.1/dns-query]
    "rule-set:ai!cn_domain":     [https://8.8.8.8/dns-query, https://1.1.1.1/dns-query]
    "rule-set:discord_domain":   [https://8.8.8.8/dns-query, https://1.1.1.1/dns-query]

